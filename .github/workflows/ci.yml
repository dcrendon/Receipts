name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install renderer dependencies
        run: npm --prefix reporting/shadcn-renderer install --no-audit --no-fund

      - name: Format check
        run: deno fmt --check

      - name: Run tests
        run: deno task test
